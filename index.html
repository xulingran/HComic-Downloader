<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <title>HComic Downloader</title>

    <style>
      /* 骨架屏 —— 在 React 挂载前展示 */
      .skeleton {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.3s ease;
      }
      @media (prefers-color-scheme: dark) {
        .skeleton {
          background: #1a1a2e;
          color: #e0e0e0;
        }
      }
      @keyframes skeleton-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes skeleton-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .skeleton-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #4a90d9, #7c5cbf);
        margin-bottom: 24px;
        animation: skeleton-pulse 1.5s ease-in-out infinite;
      }
      .skeleton-text {
        width: 200px;
        height: 18px;
        background: #d0d0d0;
        border-radius: 4px;
        animation: skeleton-pulse 1.5s ease-in-out infinite;
      }
      @media (prefers-color-scheme: dark) {
        .skeleton-text {
          background: #3a3a5c;
        }
      }
      .skeleton-spinner {
        width: 24px;
        height: 24px;
        border: 3px solid #d0d0d0;
        border-top-color: #4a90d9;
        border-radius: 50%;
        margin-bottom: 16px;
        animation: skeleton-spin 0.8s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .skeleton-spinner {
          border-color: #3a3a5c;
          border-top-color: #7c5cbf;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="skeleton">
        <div class="skeleton-spinner"></div>
        <div class="skeleton-logo"></div>
        <div class="skeleton-text">HComic Downloader 启动中…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>请启用 JavaScript 以使用 HComic Downloader</noscript>
  </body>
</html>
