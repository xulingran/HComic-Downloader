<h2>选择你喜欢的 UI 风格</h2>
<p class="subtitle">HComic Downloader 的视觉方向</p>

<div class="cards">
  <div class="card" data-choice="modern-dark" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; min-height: 180px;">
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="background: #e94560; width: 60px; height: 8px; border-radius: 4px;"></div>
        <div style="background: #0f3460; width: 40px; height: 8px; border-radius: 4px;"></div>
      </div>
      <div style="display: flex; gap: 12px;">
        <div style="background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; flex: 1;">
          <div style="background: #e94560; width: 80%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: rgba(255,255,255,0.2); width: 60%; height: 4px; border-radius: 2px;"></div>
        </div>
        <div style="background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; flex: 1;">
          <div style="background: #e94560; width: 70%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: rgba(255,255,255,0.2); width: 50%; height: 4px; border-radius: 2px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>深色科技风</h3>
      <p>深蓝背景 + 红色点缀，现代感强，适合长时间使用</p>
    </div>
  </div>

  <div class="card" data-choice="clean-light" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #f5f7fa, #e4e8ec); padding: 20px; min-height: 180px;">
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="background: #4A90D9; width: 60px; height: 8px; border-radius: 4px;"></div>
        <div style="background: #95a5a6; width: 40px; height: 8px; border-radius: 4px;"></div>
      </div>
      <div style="display: flex; gap: 12px;">
        <div style="background: white; border-radius: 8px; padding: 12px; flex: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
          <div style="background: #4A90D9; width: 80%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: #bdc3c7; width: 60%; height: 4px; border-radius: 2px;"></div>
        </div>
        <div style="background: white; border-radius: 8px; padding: 12px; flex: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
          <div style="background: #4A90D9; width: 70%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: #bdc3c7; width: 50%; height: 4px; border-radius: 2px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>简洁明亮风</h3>
      <p>白色背景 + 蓝色主题，清爽干净，类似 macOS 风格</p>
    </div>
  </div>

  <div class="card" data-choice="glassmorphism" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; min-height: 180px;">
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="background: rgba(255,255,255,0.3); width: 60px; height: 8px; border-radius: 4px; backdrop-filter: blur(4px);"></div>
        <div style="background: rgba(255,255,255,0.2); width: 40px; height: 8px; border-radius: 4px;"></div>
      </div>
      <div style="display: flex; gap: 12px;">
        <div style="background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; flex: 1; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);">
          <div style="background: rgba(255,255,255,0.4); width: 80%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: rgba(255,255,255,0.2); width: 60%; height: 4px; border-radius: 2px;"></div>
        </div>
        <div style="background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; flex: 1; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);">
          <div style="background: rgba(255,255,255,0.4); width: 70%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: rgba(255,255,255,0.2); width: 50%; height: 4px; border-radius: 2px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>毛玻璃渐变风</h3>
      <p>紫色渐变 + 磨砂玻璃效果，时尚梦幻，视觉冲击力强</p>
    </div>
  </div>

  <div class="card" data-choice="anime-acg" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #ffecd2, #fcb69f); padding: 20px; min-height: 180px;">
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="background: #ff6b6b; width: 60px; height: 8px; border-radius: 4px;"></div>
        <div style="background: #ffa07a; width: 40px; height: 8px; border-radius: 4px;"></div>
      </div>
      <div style="display: flex; gap: 12px;">
        <div style="background: white; border-radius: 12px; padding: 12px; flex: 1; box-shadow: 0 4px 12px rgba(255,107,107,0.2);">
          <div style="background: #ff6b6b; width: 80%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: #ffd93d; width: 60%; height: 4px; border-radius: 2px;"></div>
        </div>
        <div style="background: white; border-radius: 12px; padding: 12px; flex: 1; box-shadow: 0 4px 12px rgba(255,107,107,0.2);">
          <div style="background: #ff6b6b; width: 70%; height: 6px; border-radius: 3px; margin-bottom: 8px;"></div>
          <div style="background: #ffd93d; width: 50%; height: 4px; border-radius: 2px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>二次元暖色风</h3>
      <p>暖橙粉色调 + 圆角卡片，可爱活泼，符合漫画主题</p>
    </div>
  </div>
</div>
