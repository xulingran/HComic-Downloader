<h2>选择主界面布局</h2>
<p class="subtitle">搜索结果和功能区域的组织方式</p>

<div class="cards">
  <div class="card" data-choice="sidebar-nav" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 200px;">
      <div style="display: flex; height: 160px; gap: 8px;">
        <!-- Sidebar -->
        <div style="background: white; border-radius: 8px; width: 50px; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
          <div style="width: 24px; height: 24px; background: #4A90D9; border-radius: 6px;"></div>
          <div style="width: 20px; height: 20px; background: #bdc3c7; border-radius: 4px;"></div>
          <div style="width: 20px; height: 20px; background: #bdc3c7; border-radius: 4px;"></div>
          <div style="width: 20px; height: 20px; background: #bdc3c7; border-radius: 4px;"></div>
        </div>
        <!-- Main content -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
          <!-- Search bar -->
          <div style="background: white; border-radius: 8px; height: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <!-- Grid -->
          <div style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
            <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>侧边导航栏</h3>
      <p>左侧图标导航，右侧主内容区，类似 VS Code / Telegram 风格</p>
    </div>
  </div>

  <div class="card" data-choice="top-tabs" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 200px;">
      <div style="display: flex; flex-direction: column; height: 160px; gap: 8px;">
        <!-- Top nav -->
        <div style="background: white; border-radius: 8px; height: 36px; display: flex; align-items: center; padding: 0 12px; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
          <div style="background: #4A90D9; width: 40px; height: 6px; border-radius: 3px;"></div>
          <div style="background: #bdc3c7; width: 40px; height: 6px; border-radius: 3px;"></div>
          <div style="background: #bdc3c7; width: 40px; height: 6px; border-radius: 3px;"></div>
          <div style="flex: 1;"></div>
          <div style="background: #4A90D9; width: 60px; height: 20px; border-radius: 10px;"></div>
        </div>
        <!-- Search bar -->
        <div style="background: white; border-radius: 8px; height: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
        <!-- Grid -->
        <div style="flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
          <div style="background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>顶部标签页</h3>
      <p>顶部 Tab 切换功能区，下方搜索 + 网格，类似浏览器风格</p>
    </div>
  </div>

  <div class="card" data-choice="single-page" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 200px;">
      <div style="display: flex; flex-direction: column; height: 160px; gap: 8px;">
        <!-- Header with search -->
        <div style="background: white; border-radius: 8px; height: 48px; display: flex; align-items: center; padding: 0 16px; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
          <div style="background: #4A90D9; width: 28px; height: 28px; border-radius: 6px;"></div>
          <div style="flex: 1; background: #f0f2f5; height: 28px; border-radius: 14px;"></div>
          <div style="background: #4A90D9; width: 60px; height: 28px; border-radius: 14px;"></div>
        </div>
        <!-- Content area with cards -->
        <div style="flex: 1; display: flex; gap: 12px;">
          <!-- Main cards -->
          <div style="flex: 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
            <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column;">
              <div style="background: #e8ecf1; flex: 1; border-radius: 12px 12px 0 0;"></div>
              <div style="padding: 8px;">
                <div style="background: #4A90D9; width: 70%; height: 6px; border-radius: 3px; margin-bottom: 4px;"></div>
                <div style="background: #bdc3c7; width: 50%; height: 4px; border-radius: 2px;"></div>
              </div>
            </div>
            <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column;">
              <div style="background: #e8ecf1; flex: 1; border-radius: 12px 12px 0 0;"></div>
              <div style="padding: 8px;">
                <div style="background: #4A90D9; width: 60%; height: 6px; border-radius: 3px; margin-bottom: 4px;"></div>
                <div style="background: #bdc3c7; width: 40%; height: 4px; border-radius: 2px;"></div>
              </div>
            </div>
            <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column;">
              <div style="background: #e8ecf1; flex: 1; border-radius: 12px 12px 0 0;"></div>
              <div style="padding: 8px;">
                <div style="background: #4A90D9; width: 80%; height: 6px; border-radius: 3px; margin-bottom: 4px;"></div>
                <div style="background: #bdc3c7; width: 55%; height: 4px; border-radius: 2px;"></div>
              </div>
            </div>
          </div>
          <!-- Right panel -->
          <div style="flex: 1; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 12px;">
            <div style="background: #4A90D9; width: 60%; height: 6px; border-radius: 3px; margin-bottom: 12px;"></div>
            <div style="background: #f0f2f5; height: 8px; border-radius: 4px; margin-bottom: 8px;"></div>
            <div style="background: #f0f2f5; height: 8px; border-radius: 4px; margin-bottom: 8px;"></div>
            <div style="background: #f0f2f5; height: 8px; border-radius: 4px; width: 70%;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>单页应用</h3>
      <p>顶部搜索栏 + 卡片网格 + 右侧详情面板，类似 App Store 风格</p>
    </div>
  </div>
</div>
