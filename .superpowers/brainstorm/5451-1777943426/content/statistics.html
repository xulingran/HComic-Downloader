<h2>选择数据统计页面样式</h2>
<p class="subtitle">存储空间、下载统计等数据的可视化展示</p>

<div class="cards">
  <div class="card" data-choice="dashboard-cards" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 200px;">
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;">
        <!-- Stat card 1 -->
        <div style="background: white; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div style="width: 32px; height: 32px; background: #e3f2fd; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <div style="width: 16px; height: 16px; background: #3498db; border-radius: 4px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 50px; height: 6px; border-radius: 3px;"></div>
          </div>
          <div style="background: #2c3e50; width: 60px; height: 16px; border-radius: 4px; margin-bottom: 4px;"></div>
          <div style="background: #27ae60; width: 40px; height: 6px; border-radius: 3px;"></div>
        </div>
        <!-- Stat card 2 -->
        <div style="background: white; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div style="width: 32px; height: 32px; background: #e8f5e9; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <div style="width: 16px; height: 16px; background: #27ae60; border-radius: 4px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 45px; height: 6px; border-radius: 3px;"></div>
          </div>
          <div style="background: #2c3e50; width: 55px; height: 16px; border-radius: 4px; margin-bottom: 4px;"></div>
          <div style="background: #3498db; width: 35px; height: 6px; border-radius: 3px;"></div>
        </div>
        <!-- Stat card 3 -->
        <div style="background: white; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div style="width: 32px; height: 32px; background: #fff3e0; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <div style="width: 16px; height: 16px; background: #f39c12; border-radius: 4px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 55px; height: 6px; border-radius: 3px;"></div>
          </div>
          <div style="background: #2c3e50; width: 50px; height: 16px; border-radius: 4px; margin-bottom: 4px;"></div>
          <div style="background: #f39c12; width: 45px; height: 6px; border-radius: 3px;"></div>
        </div>
      </div>
      <!-- Chart area -->
      <div style="background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <div style="background: #2c3e50; width: 80px; height: 8px; border-radius: 4px;"></div>
          <div style="display: flex; gap: 6px;">
            <div style="background: #e3f2fd; width: 30px; height: 16px; border-radius: 8px;"></div>
            <div style="background: #f5f5f5; width: 30px; height: 16px; border-radius: 8px;"></div>
          </div>
        </div>
        <!-- Simple bar chart -->
        <div style="display: flex; align-items: flex-end; gap: 8px; height: 60px;">
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 40%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 65%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 85%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 50%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 90%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 70%;"></div>
          <div style="flex: 1; background: #3498db; border-radius: 4px 4px 0 0; height: 55%;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>仪表盘卡片</h3>
      <p>顶部数据卡片 + 下方图表，类似 GitHub Insights / Vercel Dashboard</p>
    </div>
  </div>

  <div class="card" data-choice="minimal-stats" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 200px;">
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <!-- Storage usage -->
        <div style="background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div style="background: #2c3e50; width: 70px; height: 8px; border-radius: 4px;"></div>
            <div style="background: #bdc3c7; width: 50px; height: 6px; border-radius: 3px;"></div>
          </div>
          <!-- Circular progress -->
          <div style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background: conic-gradient(#3498db 0% 65%, #e3f2fd 65% 100%); display: flex; align-items: center; justify-content: center;">
              <div style="width: 44px; height: 44px; background: white; border-radius: 50%;"></div>
            </div>
            <div style="flex: 1;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                <div style="background: #bdc3c7; width: 40px; height: 5px; border-radius: 2px;"></div>
                <div style="background: #2c3e50; width: 30px; height: 5px; border-radius: 2px;"></div>
              </div>
              <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                <div style="background: #bdc3c7; width: 35px; height: 5px; border-radius: 2px;"></div>
                <div style="background: #2c3e50; width: 25px; height: 5px; border-radius: 2px;"></div>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <div style="background: #bdc3c7; width: 45px; height: 5px; border-radius: 2px;"></div>
                <div style="background: #2c3e50; width: 28px; height: 5px; border-radius: 2px;"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- Recent activity -->
        <div style="background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="background: #2c3e50; width: 80px; height: 8px; border-radius: 4px; margin-bottom: 12px;"></div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 10px;">
              <div style="width: 8px; height: 8px; background: #27ae60; border-radius: 50%;"></div>
              <div style="background: #bdc3c7; flex: 1; height: 6px; border-radius: 3px;"></div>
              <div style="background: #e8e8e8; width: 40px; height: 5px; border-radius: 2px;"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <div style="width: 8px; height: 8px; background: #3498db; border-radius: 50%;"></div>
              <div style="background: #bdc3c7; flex: 1; height: 6px; border-radius: 3px;"></div>
              <div style="background: #e8e8e8; width: 35px; height: 5px; border-radius: 2px;"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <div style="width: 8px; height: 8px; background: #f39c12; border-radius: 50%;"></div>
              <div style="background: #bdc3c7; flex: 1; height: 6px; border-radius: 3px;"></div>
              <div style="background: #e8e8e8; width: 45px; height: 5px; border-radius: 2px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>简约统计</h3>
      <p>环形进度图 + 列表式数据，简洁直观，适合小窗口</p>
    </div>
  </div>
</div>
