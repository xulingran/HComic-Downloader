<h2>选择下载进度展示方式</h2>
<p class="subtitle">下载管理页面中如何显示任务进度</p>

<div class="cards">
  <div class="card" data-choice="progress-bar" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 180px;">
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <!-- Download item 1 -->
        <div style="background: white; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #a8edea, #fed6e3); border-radius: 8px;"></div>
            <div style="flex: 1;">
              <div style="background: #2c3e50; width: 70%; height: 8px; border-radius: 4px; margin-bottom: 4px;"></div>
              <div style="background: #bdc3c7; width: 40%; height: 5px; border-radius: 2px;"></div>
            </div>
            <div style="background: #27ae60; color: white; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold;">完成</div>
          </div>
          <div style="background: #e8f5e9; height: 6px; border-radius: 3px; overflow: hidden;">
            <div style="background: #27ae60; width: 100%; height: 100%; border-radius: 3px;"></div>
          </div>
        </div>
        <!-- Download item 2 -->
        <div style="background: white; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #ffecd2, #fcb69f); border-radius: 8px;"></div>
            <div style="flex: 1;">
              <div style="background: #2c3e50; width: 65%; height: 8px; border-radius: 4px; margin-bottom: 4px;"></div>
              <div style="background: #bdc3c7; width: 35%; height: 5px; border-radius: 2px;"></div>
            </div>
            <div style="background: #3498db; color: white; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold;">67%</div>
          </div>
          <div style="background: #e3f2fd; height: 6px; border-radius: 3px; overflow: hidden;">
            <div style="background: #3498db; width: 67%; height: 100%; border-radius: 3px;"></div>
          </div>
        </div>
        <!-- Download item 3 -->
        <div style="background: white; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); border-radius: 8px;"></div>
            <div style="flex: 1;">
              <div style="background: #2c3e50; width: 75%; height: 8px; border-radius: 4px; margin-bottom: 4px;"></div>
              <div style="background: #bdc3c7; width: 45%; height: 5px; border-radius: 2px;"></div>
            </div>
            <div style="background: #f39c12; color: white; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold;">等待中</div>
          </div>
          <div style="background: #fff3e0; height: 6px; border-radius: 3px; overflow: hidden;">
            <div style="background: #f39c12; width: 0%; height: 100%; border-radius: 3px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>进度条列表</h3>
      <p>每个任务一行，显示封面缩略图 + 标题 + 进度条 + 状态标签</p>
    </div>
  </div>

  <div class="card" data-choice="card-grid" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f7fa; padding: 16px; min-height: 180px;">
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
        <!-- Card 1 - completed -->
        <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="background: linear-gradient(135deg, #a8edea, #fed6e3); height: 60px; position: relative;">
            <div style="position: absolute; top: 6px; right: 6px; background: #27ae60; color: white; padding: 2px 8px; border-radius: 8px; font-size: 9px;">完成</div>
          </div>
          <div style="padding: 8px;">
            <div style="background: #2c3e50; width: 80%; height: 6px; border-radius: 3px; margin-bottom: 6px;"></div>
            <div style="background: #e8f5e9; height: 4px; border-radius: 2px;">
              <div style="background: #27ae60; width: 100%; height: 100%; border-radius: 2px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 30%; height: 4px; border-radius: 2px; margin-top: 4px;"></div>
          </div>
        </div>
        <!-- Card 2 - downloading -->
        <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="background: linear-gradient(135deg, #ffecd2, #fcb69f); height: 60px; position: relative;">
            <div style="position: absolute; top: 6px; right: 6px; background: #3498db; color: white; padding: 2px 8px; border-radius: 8px; font-size: 9px;">下载中</div>
          </div>
          <div style="padding: 8px;">
            <div style="background: #2c3e50; width: 70%; height: 6px; border-radius: 3px; margin-bottom: 6px;"></div>
            <div style="background: #e3f2fd; height: 4px; border-radius: 2px;">
              <div style="background: #3498db; width: 45%; height: 100%; border-radius: 2px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 25%; height: 4px; border-radius: 2px; margin-top: 4px;"></div>
          </div>
        </div>
        <!-- Card 3 - queued -->
        <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb); height: 60px; position: relative;">
            <div style="position: absolute; top: 6px; right: 6px; background: #f39c12; color: white; padding: 2px 8px; border-radius: 8px; font-size: 9px;">等待中</div>
          </div>
          <div style="padding: 8px;">
            <div style="background: #2c3e50; width: 85%; height: 6px; border-radius: 3px; margin-bottom: 6px;"></div>
            <div style="background: #fff3e0; height: 4px; border-radius: 2px;">
              <div style="background: #f39c12; width: 0%; height: 100%; border-radius: 2px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 35%; height: 4px; border-radius: 2px; margin-top: 4px;"></div>
          </div>
        </div>
        <!-- Card 4 - error -->
        <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
          <div style="background: linear-gradient(135deg, #f093fb, #f5576c); height: 60px; position: relative;">
            <div style="position: absolute; top: 6px; right: 6px; background: #e74c3c; color: white; padding: 2px 8px; border-radius: 8px; font-size: 9px;">失败</div>
          </div>
          <div style="padding: 8px;">
            <div style="background: #2c3e50; width: 60%; height: 6px; border-radius: 3px; margin-bottom: 6px;"></div>
            <div style="background: #fce4ec; height: 4px; border-radius: 2px;">
              <div style="background: #e74c3c; width: 30%; height: 100%; border-radius: 2px;"></div>
            </div>
            <div style="background: #bdc3c7; width: 40%; height: 4px; border-radius: 2px; margin-top: 4px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>卡片网格</h3>
      <p>每个任务一张卡片，2列网格布局，封面为主，进度条在底部</p>
    </div>
  </div>
</div>
