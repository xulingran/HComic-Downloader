name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for Windows
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for macOS (arm64)
        run: npx electron-builder --mac --arm64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for Linux
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
