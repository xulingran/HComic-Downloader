name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for Windows
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for macOS (arm64)
        run: npx electron-builder --mac --arm64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - run: npm install

      - name: Set version from git tag
        run: npm run version:from-git

      - name: Build Python backend
        run: npm run build:python

      - name: Build Electron app
        run: npm run build

      - name: Package for Linux
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # extract-changelog 需读取 tag，需完整历史

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for release notes
        id: changelog
        run: |
          python scripts/extract-changelog.py --version "${{ github.ref_name }}" --out RELEASE_NOTES.md
          # 若 CHANGELOG 无此版本段落，脚本写入回退文本，此时回落到自动生成
          if grep -q "详见 \[CHANGELOG.md\]" RELEASE_NOTES.md; then
            echo "use_auto=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_auto=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          # CHANGELOG 命中时用提取的正文；未命中回落到自动生成（commit 对比）
          body_file: ${{ steps.changelog.outputs.use_auto != 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.use_auto == 'true' }}
          files: artifacts/**/*
